<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' capacitor: https: data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'" />
    <title>Solvestay</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        padding: 1.5rem;
        text-align: center;
      }
      p {
        max-width: 22rem;
        line-height: 1.5;
        font-size: 0.95rem;
      }
      code {
        font-size: 0.8rem;
        color: #a5b4fc;
      }
    </style>
  </head>
  <body>
    <div>
      <p>
        If you see this screen, set <code>CAPACITOR_SERVER_URL</code> to your
        deployed HTTPS origin, then run <code>npx cap sync android</code> and
        rebuild the app.
      </p>
    </div>
  </body>
</html>
